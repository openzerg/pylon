syntax = "proto3";

package pylon;

service PylonService {
  rpc Chat(ChatRequest) returns (stream ChatResponse);
  rpc StreamChat(stream ChatRequest) returns (stream ChatResponse);
  rpc GetModels(Empty) returns (ModelList);
  rpc GetModel(GetModelRequest) returns (Model);
}

message Empty {}

message ChatRequest {
  string model = 1;
  repeated Message messages = 2;
  double temperature = 3;
  int32 max_tokens = 4;
}

message Message {
  string role = 1;
  string content = 2;
}

message ChatResponse {
  string content = 1;
  string model = 2;
  bool done = 3;
}

message ModelList {
  repeated Model models = 1;
}

message Model {
  string id = 1;
  string provider = 2;
  bool available = 3;
}

message GetModelRequest {
  string id = 1;
}