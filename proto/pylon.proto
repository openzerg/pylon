syntax = "proto3";

package pylon;

service PylonService {
  // Proxy management
  rpc ListProxies(Empty) returns (ProxyListResponse);
  rpc GetProxy(GetProxyRequest) returns (ProxyInfo);
  rpc CreateProxy(CreateProxyRequest) returns (ProxyInfo);
  rpc UpdateProxy(UpdateProxyRequest) returns (ProxyInfo);
  rpc DeleteProxy(DeleteProxyRequest) returns (Empty);

  // Permission management
  rpc AuthorizeAgent(AuthorizeAgentRequest) returns (Empty);
  rpc RevokeAgent(RevokeAgentRequest) returns (Empty);
  rpc ListPermissions(ListPermissionsRequest) returns (PermissionListResponse);
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);

  // LLM calls
  rpc ChatCompletion(ChatCompletionRequest) returns (ChatCompletionResponse);
  rpc StreamChatCompletion(ChatCompletionRequest) returns (stream ChatCompletionChunk);
  rpc ListModels(Empty) returns (ModelListResponse);

  // Logs and stats
  rpc QueryLogs(LogQueryRequest) returns (LogListResponse);
  rpc GetStats(Empty) returns (StatsResponse);
}

message Empty {}

message ProxyInfo {
  string id = 1;
  string source_model = 2;
  string target_model = 3;
  string upstream = 4;
  bool support_streaming = 5;
  bool support_tools = 6;
  bool support_vision = 7;
  optional int32 default_max_tokens = 8;
  optional double default_temperature = 9;
  optional double default_top_p = 10;
  optional int32 default_top_k = 11;
  string created_at = 12;
  string updated_at = 13;
}

message ProxyListResponse {
  repeated ProxyInfo proxies = 1;
}

message GetProxyRequest {
  string id = 1;
}

message CreateProxyRequest {
  string id = 1;
  string source_model = 2;
  string target_model = 3;
  string upstream = 4;
  string api_key = 5;
  optional int32 default_max_tokens = 6;
  optional double default_temperature = 7;
  optional double default_top_p = 8;
  optional int32 default_top_k = 9;
  optional bool support_streaming = 10;
  optional bool support_tools = 11;
  optional bool support_vision = 12;
  optional string extra_headers = 13;
  optional string extra_body = 14;
}

message UpdateProxyRequest {
  string id = 1;
  string source_model = 2;
  string target_model = 3;
  string upstream = 4;
  optional string api_key = 5;
  optional int32 default_max_tokens = 6;
  optional double default_temperature = 7;
  optional double default_top_p = 8;
  optional int32 default_top_k = 9;
  optional bool support_streaming = 10;
  optional bool support_tools = 11;
  optional bool support_vision = 12;
  optional string extra_headers = 13;
  optional string extra_body = 14;
}

message DeleteProxyRequest {
  string id = 1;
}

message PermissionInfo {
  int64 id = 1;
  string proxy_id = 2;
  string agent_name = 3;
  string permission_level = 4;
  string granted_by = 5;
  string granted_at = 6;
}

message PermissionListResponse {
  repeated PermissionInfo permissions = 1;
}

message AuthorizeAgentRequest {
  string proxy_id = 1;
  string agent_name = 2;
  optional string permission_level = 3;
}

message RevokeAgentRequest {
  string proxy_id = 1;
  string agent_name = 2;
}

message ListPermissionsRequest {
  string proxy_id = 1;
}

message CheckPermissionRequest {
  string proxy_id = 1;
  string agent_name = 2;
}

message CheckPermissionResponse {
  bool has_permission = 1;
}

message ChatCompletionRequest {
  string agent_name = 1;
  string request_json = 2;
}

message ChatCompletionResponse {
  string response_json = 1;
  bool success = 2;
  optional string error = 3;
}

message ChatCompletionChunk {
  string chunk_json = 1;
  bool is_done = 2;
}

message ModelInfo {
  string id = 1;
  string source_model = 2;
  string target_model = 3;
  string upstream = 4;
}

message ModelListResponse {
  repeated ModelInfo models = 1;
}

message LogQueryRequest {
  optional string start_date = 1;
  optional string end_date = 2;
  optional string user_id = 3;
  optional string proxy_id = 4;
  optional string source_model = 5;
  optional bool is_success = 6;
  optional int32 limit = 7;
  optional int32 offset = 8;
}

message LogInfo {
  int64 id = 1;
  optional string proxy_id = 2;
  string user_id = 3;
  string user_role = 4;
  string source_model = 5;
  string target_model = 6;
  string upstream = 7;
  string request_method = 8;
  string request_path = 9;
  optional string request_body = 10;
  optional int32 response_status = 11;
  optional string response_body = 12;
  optional int32 duration_ms = 13;
  bool is_stream = 14;
  bool is_success = 15;
  optional string error_type = 16;
  optional string error_message = 17;
  string created_at = 18;
}

message LogListResponse {
  repeated LogInfo logs = 1;
  int64 total = 2;
}

message StatsResponse {
  int64 total_proxies = 1;
  int64 total_requests_today = 2;
  int64 successful_requests_today = 3;
  double success_rate = 4;
  double avg_duration_ms = 5;
  int64 total_input_tokens = 6;
  int64 total_output_tokens = 7;
}